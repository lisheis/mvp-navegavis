name: navegavis
description: Indoor navigation system with WiFi-based positioning and voice guidance
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Local storage / cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # HTTP client
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # WiFi scanning
  wifi_scan: ^0.4.1

  # Voice
  flutter_tts: ^3.8.5
  speech_to_text: ^7.3.0

  # Navigation / routing
  go_router: ^12.1.3

  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  permission_handler: ^11.1.0

  # JSON serialization
  json_annotation: ^4.8.1

  # Math
  vector_math: ^2.1.4

  # UUID
  uuid: ^4.2.2

  # Logging
  logger: ^2.0.2+1

  # File picker (PDF / JSON import)
  file_picker: ^8.1.2

  # PDF rendering (planta baixa → imagem)
  pdfx: ^2.6.0

  # Shared preferences (persist app mode)
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/maps/
    - assets/icons/
